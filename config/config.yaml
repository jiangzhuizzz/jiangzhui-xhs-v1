# 配置文件说明

# 飞书配置
feishu:
  app_id: "cli_xxxxxxxxxxxxx"      # 飞书应用 ID
  app_secret: "xxxxxxxxxxxxxxxxxx"  # 飞书应用密钥
  table_id_topics: "tblxxxxxxxxxx" # 选题库多维表格 ID
  table_id_notes: "tblxxxxxxxxxx"   # 笔记库多维表格 ID

# 小红书配置
xiaohongshu:
  openclaw_url: "http://127.0.0.1:18789"  # OpenClaw 地址
  cdp_port: 18789                          # CDP 端口

# 图片配置
image:
  theme: "sketch"      # 主题
  mode: "auto-split"   # 分页模式

# 违禁词配置
check:
  max_retries: 3       # 最大检测次数
