# ==================== 图片配置 ====================
image:
  theme: "sketch"
  mode: "auto-split"

# ==================== 工作流环节 ====================
# 完整流程：选题 → 初稿 → 违禁词检测 → 配图 → 人工审核 → 待发布 → 已发布

workflow:
  stages:
    - 选题       # 选题库中选定的选题
    - 初稿       # AI生成的文案初稿
    - 检测       # 违禁词检测
    - 配图       # 图片渲染完成
    - 审核       # 人工审核确认
    - 待发布     # 已保存到小红书草稿箱
    - 已发布     # 已发布到小红书

# ==================== 违禁词配置 ====================
check:
  max_retries: 3

# ==================== 运营提示词（可直接调用） ====================
# 使用方式：读取此配置的 prompts 字段，注入到 AI 生成

prompts:
  # 账号状态说明
  account_status: |
    当前账号状态：新账号（冷启动），粉丝 0-500
    内容策略：情感类、生活类为主，少发营销内容
    安全提示：禁止引导私信、禁止承诺 100% 下款

  # 内容类型映射
  content_types:
    情感共鸣: "情感故事、心情分享，适合晚上发"
    武汉生活: "过早、美食、周末玩法，适合中午/傍晚"
    贷款干货: "公积金、信贷知识，需案例包装"
    工具类: "测评、教程类"

  # 生成模板
  template: |
    # {{标题}}
    
    {{正文}}
    
    #{{话题1}} #{{话题2}} #{{话题3}}

  # 违禁词提醒
  forbidden_words:
    - "互粉"
    - "找我"
    - "私信"
    - "贷款中介"
    - "包下款"
    - "100%"

# ==================== 图片输出目录 ====================
output:
  picture_dir: "./picture"
