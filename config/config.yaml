# ==================== 工作流环节 ====================
# 完整流程：选题 → 初稿 → 违禁词检测 → 配图 → 人工审核 → 待发布 → 已发布

workflow:
  stages:
    - 选题       # 选题库中选定的选题
    - 初稿       # AI生成的文案初稿
    - 检测       # 违禁词检测
    - 配图       # 图片渲染完成
    - 审核       # 人工审核确认
    - 待发布     # 已保存到小红书草稿箱
    - 已发布     # 已发布到小红书

# ==================== 违禁词配置 ====================
check:
  max_retries: 3

# ==================== 运营提示词（可直接调用） ====================
# 使用方式：读取此配置的 prompts 字段，注入到 AI 生成

prompts:
  # 账号状态说明
  account_status: |
    当前账号状态：新账号（冷启动），粉丝 0-500
    内容策略：情感类、生活类为主，少发营销内容
    安全提示：禁止引导私信、禁止承诺 100% 下款

  # 内容类型映射
  content_types:
    情感共鸣: "情感故事、心情分享，适合晚上发"
    武汉生活: "过早、美食、周末玩法，适合中午/傍晚"
    贷款干货: "公积金、信贷知识，需案例包装"
    工具类: "测评、教程类"

  # 小红书文案生成核心提示词
  xiaohongshu_writing_guide: |
    # 小红书文案生成指南
    
    ## 一、标题撰写技巧
    
    ### 1. 标题公式（选其一）
    - 【数字型】：武汉过早plog｜这一碗热干面才8块钱
    - 【疑问型】：公积金贷款真的比商贷划算吗？
    - 【对比型】：信用贷 vs 抵押贷，哪个更适合你？
    - 【情感型】：在武汉3年，终于找到了家的感觉
    - 【干货型】：公积金贷款避坑指南｜新手必看
    
    ### 2. 标题要素
    - ✅ 包含关键词（地域/产品/场景）
    - ✅ 制造悬念或好奇
    - ✅ 数字具体化（8块钱 > 便宜）
    - ✅ 使用emoji增加视觉吸引力
    - ❌ 避免标题党（不要过度夸张）
    - ❌ 避免违禁词（互粉、私信、100%等）
    
    ## 二、正文结构模板
    
    ### 模板 1：生活分享型
    ```
    【开头】一句话引入场景/情感
    【正文】
    - 为什么推荐/分享这个？
    - 具体细节（价格/位置/体验）
    - 个人感受/故事
    【结尾】互动引导（你有类似经历吗？）
    【话题】#地域标签 #内容标签 #情感标签
    ```
    
    ### 模板 2：干货攻略型
    ```
    【开头】痛点/问题引入
    【正文】
    - 核心知识点（3-5条）
    - 每条配具体案例/数据
    - 避坑提示
    【结尾】总结 + 互动
    【话题】#干货 #攻略 #行业标签
    ```
    
    ### 模板 3：对比评测型
    ```
    【开头】对比主题
    【正文】
    - 维度1对比（价格/利率/门槛等）
    - 维度2对比
    - 维度3对比
    - 适用人群建议
    【结尾】选择建议
    【话题】#对比 #选择 #产品标签
    ```
    
    ## 三、小红书风格要点
    
    ### 1. 语言风格
    - ✅ 口语化、接地气（"真的绝了" "太香了"）
    - ✅ 适当使用emoji（但不要过多）
    - ✅ 分段清晰（每段2-3行）
    - ✅ 使用列表/序号（提高可读性）
    - ❌ 避免官方腔调
    - ❌ 避免长段落（超过5行）
    
    ### 2. 情感共鸣
    - 真实体验 > 理论说教
    - 个人故事 > 泛泛而谈
    - 具体细节 > 抽象描述
    - 同理心 > 说教
    
    ### 3. 互动引导（合规版）
    - ✅ "你有类似经历吗？评论区聊聊"
    - ✅ "有问题可以评论区问我"
    - ✅ "喜欢的话可以支持一下"
    - ❌ "点赞收藏关注"（太直白）
    - ❌ "私信我"（违规）
    - ❌ "互粉"（违规）
    
    ## 四、话题标签策略
    
    ### 1. 标签组合（3-5个）
    - 地域标签：#武汉 #武汉生活 #武汉美食
    - 内容标签：#过早 #热干面 #公积金贷款
    - 情感标签：#生活记录 #日常分享 #干货分享
    - 流量标签：#小红书 #种草 #攻略
    
    ### 2. 标签选择原则
    - 精准 > 泛泛（#武汉热干面 > #美食）
    - 热门 + 精准组合
    - 避免纯流量标签（容易被限流）
    
    ## 五、内容类型适配
    
    ### 情感共鸣类
    - 重点：真实故事 + 情感细节
    - 适合时段：晚上 20:00-22:00
    - 话题：#生活记录 #心情分享 #感悟
    
    ### 武汉生活类
    - 重点：地域特色 + 实用信息
    - 适合时段：中午 11:00-13:00 / 傍晚 17:00-19:00
    - 话题：#武汉 #武汉生活 #本地推荐
    
    ### 贷款干货类
    - 重点：专业知识 + 案例包装
    - 适合时段：工作日 9:00-11:00 / 14:00-16:00
    - 话题：#公积金 #贷款攻略 #理财
    - 注意：避免直接暴露"贷款中介"身份
    
    ## 六、合规要点（重要！）
    
    ### 高危违禁词（必须避免）
    - 引导私信：互粉、私信、加微信、找我
    - 承诺类：包下款、100%、必过、秒批
    - 违规金融：套现、代办、包装资料
    
    ### 替换方案
    - "私信我" → "评论区交流"
    - "包下款" → "帮助申请"
    - "100%" → "大概率"
    - "贷款中介" → "金融咨询师"
    - "点赞收藏" → "喜欢的话可以支持一下"
    
    ## 七、生成流程
    
    1. 确定内容类型（情感/生活/干货）
    2. 选择标题公式
    3. 套用正文模板
    4. 检测违禁词
    5. 优化语言风格
    6. 添加话题标签
    7. 最终审核

  # 生成模板
  template: |
    # {{标题}}
    
    {{正文}}
    
    #{{话题1}} #{{话题2}} #{{话题3}}

  # 违禁词提醒
  forbidden_words:
    - "互粉"
    - "找我"
    - "私信"
    - "贷款中介"
    - "包下款"
    - "100%"

